name: Daily slate

# Each run: grade yesterday's predictions (games now final), rebuild today's
# data.js, record today's predictions. Cron is UTC; 13:00 UTC ~= 9:00 AM ET.
on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Grade yesterday's predictions
        run: node eval/grade.js

      - name: Build today's data.js
        run: node build-slate.js

      - name: Record today's predictions
        run: node eval/record.js

      - name: Commit if changed
        run: |
          git config user.name  "barreliq-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.js eval/predictions.jsonl
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "slate + predictions + grades $(date -u +%Y-%m-%d)"
            git push
          fi
