name: Analyze model

# One-button analysis. Run from the Actions tab. Reads the graded
# eval/predictions.jsonl and prints HR rate by rating band + calibration read
# to the run log. Does not commit anything — just reports.
on:
  workflow_dispatch: {}

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Analyze
        run: node eval/analyze.js
